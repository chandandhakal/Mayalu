<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mayalu Voice Assistant</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:#0a0a14;color:#f1f5f9;display:flex;align-items:center;justify-content:center;min-height:100vh}
.panel{width:100%;max-width:460px;background:#13131a;border:1px solid #1e1e2e;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;height:90vh;max-height:720px}
.top{padding:16px 20px;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;justify-content:space-between}
.topL{display:flex;align-items:center;gap:12px}
.av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:18px}
.topL h3{font-size:16px}.topL span{font-size:12px;color:#64748b}
#lang{background:#1a1a24;border:1px solid #1e1e2e;border-radius:16px;padding:5px 14px;color:#f1f5f9;font-size:12px;cursor:pointer;outline:none}
#status{font-size:13px;color:#64748b;text-align:center;padding:6px 10px}
#msgs{flex:1;overflow:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:85%;padding:10px 16px;border-radius:14px;font-size:13px;line-height:1.5;animation:fadeUp .3s}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ai{background:#1a1a24;border:1px solid #1e1e2e;align-self:flex-start;border-top-left-radius:4px}
.user{background:#0d2818;border:1px solid #1e2e22;align-self:flex-end;border-top-right-radius:4px}
.ctrl{padding:14px 20px;border-top:1px solid #1e1e2e;display:flex;align-items:center;justify-content:center;gap:24px}
#micBtn{width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:24px}
.micOff{background:#1a1a24;color:#64748b;border:2px solid #1e1e2e}
.micOn{background:#ef4444;color:#fff;animation:pulse 1.5s infinite;border:2px solid #ef4444}
.waiting{background:#f59e0b;color:#fff;border:2px solid #f59e0b}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}70%{box-shadow:0 0 0 16px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
#hangup{width:50px;height:50px;border-radius:50%;border:2px solid #ef4444;cursor:pointer;background:transparent;color:#ef4444;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .2s}
#hangup:hover{background:#ef4444;color:#fff}
#textInput{display:flex;gap:8px;padding:0 16px 12px}
#textInput input{flex:1;padding:10px 16px;border-radius:20px;border:1px solid #1e1e2e;background:#0e0e14;color:#f1f5f9;font-size:13px;outline:none;transition:border .2s}
#textInput input:focus{border-color:#2563eb}
#textInput button{padding:10px 20px;border-radius:20px;border:none;background:#2563eb;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
#textInput button:hover{background:#1d4ed8}
.lead{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:10px 14px;font-size:12px;color:#34d399;align-self:center;text-align:center;width:90%}
.banner{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:8px 12px;font-size:11px;color:#fbbf24;text-align:center;margin:0 16px 8px;line-height:1.4}
.typing{display:flex;align-items:center;gap:4px;padding:8px 0;align-self:flex-start}
.typing span{width:8px;height:8px;border-radius:50%;background:#64748b;animation:typing 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
</style>
</head>
<body>
<div class="panel" id="panel">
  <div class="top">
    <div class="topL"><div class="av">M</div><div><h3>Mayalu</h3><span id="state">Ready</span></div></div>
    <select id="lang" onchange="switchLang()"><option value="en">English</option><option value="ne">नेपाली</option></select>
  </div>
  <div id="status">Type to chat or press 🎤 to speak</div>
  <div id="msgs"></div>
  <div id="banner"></div>
  <div id="textInput">
    <input id="txt" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendText()" />
    <button onclick="sendText()">Send</button>
  </div>
  <div class="ctrl">
    <button id="micBtn" class="micOff" onclick="toggleMic()" title="Voice input">🎤</button>
    <button id="hangup" onclick="hangup()" title="End call">📞</button>
  </div>
</div>

<script>
(function(){
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let sessionId = null, lang = 'en', active = false, listening = false, speaking = false;
let recognition = null, synthVoices = [];

// Preload voices
window.speechSynthesis.onvoiceschanged = () => { synthVoices = window.speechSynthesis.getVoices(); };
synthVoices = window.speechSynthesis.getVoices();

function $(id){return document.getElementById(id)}

function addMsg(text,isAI){
  const d=document.createElement('div');d.className='msg '+(isAI?'ai':'user');d.textContent=text;
  $('msgs').appendChild(d);$('msgs').scrollTop=$('msgs').scrollHeight;
}

function showBanner(msg){
  const b=$('banner');b.className='banner';b.textContent=msg;
  setTimeout(()=>{if(b.textContent===msg){b.className='';b.textContent=''}},8000);
}

function setState(s){$('state').textContent=s;$('status').textContent=s}

const sendText = async function(){
  const inp=$('txt'),txt=inp.value.trim();if(!txt)return;inp.value='';
  if(!active){addMsg('Connecting to Mayalu...',true);await greet();if(!active)return}
  addMsg(txt,false);setState('Thinking...');
  try{
    const r=await fetch('/api/ai/respond',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:txt,language:lang,sessionId})});
    const d=await r.json();sessionId=d.sessionId;
    addMsg(d.response,true);
    if(SR)speak(d.response);
    if(d.lead&&d.lead.name){addLead(d.lead)}
    if(d.isComplete){active=false;setState('Call ended');return}
    else setState('Connected');
  }catch(e){addMsg('Connection error. Is the backend running?',true);setState('Disconnected')}
};

async function greet(){
  setState('Connecting...');
  try{
    const r=await fetch('/api/ai/greet',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({language:lang})});
    const d=await r.json();
    sessionId=d.sessionId;addMsg(d.response,true);
    setState('Connected');active=true;
    if(SR){
      speak(d.response);
      setTimeout(()=>{if(active)startListen()},1200);
    }
  }catch(e){addMsg('Failed to connect. Is the backend running?',true);setState('Error');showBanner('Backend not reachable. Check port 3001.')}
}

function getBestVoice(){
  const voices=synthVoices.length?synthVoices:window.speechSynthesis.getVoices();
  if(!voices.length)return null;
  const prefs=['samantha','karen','zira','susan','linda'];
  let v=voices.find(x=>x.lang.startsWith('en')&&prefs.some(n=>x.name.toLowerCase().includes(n)));
  if(!v)v=voices.find(x=>x.lang.startsWith('en'));
  return v||voices[0];
}

function speak(text){
  return new Promise(resolve=>{
    window.speechSynthesis.cancel();speaking=true;
    const u=new SpeechSynthesisUtterance(text);u.lang=lang==='ne'?'ne-NP':'en-US';u.rate=.9;u.pitch=1.1;
    const v=getBestVoice();if(v)u.voice=v;
    u.onend=()=>{speaking=false;resolve()};
    u.onerror=()=>{speaking=false;resolve()};
    window.speechSynthesis.speak(u);
    setTimeout(()=>{if(speaking){window.speechSynthesis.cancel();speaking=false;resolve()}},15000);
  });
}

function startListen(){
  if(!SR){showBanner('Voice input needs Chrome or Edge. You can still type instead!');return}
  if(!active||speaking||listening)return;
  if(recognition){try{recognition.abort()}catch(e){}}
  const r=new SR();r.continuous=false;r.interimResults=false;r.lang=lang==='ne'?'ne-NP':'en-US';
  r.onstart=()=>{listening=true;$('micBtn').className='micOn';$('micBtn').textContent='🔴';setState('Listening...')};
  r.onresult=async e=>{
    const txt=e.results[0][0].transcript;listening=false;$('micBtn').className='micOff';$('micBtn').textContent='🎤';
    if(!txt.trim()){if(active)setTimeout(startListen,800);return}
    addMsg(txt,false);setState('Thinking...');
    try{
      const r2=await fetch('/api/ai/respond',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:txt,language:lang,sessionId})});
      const d=await r2.json();sessionId=d.sessionId;
      addMsg(d.response,true);setState('Speaking...');await speak(d.response);
      if(d.lead&&d.lead.name)addLead(d.lead);
      if(d.isComplete){active=false;setState('Call ended');return}
      setState('Connected');if(active)startListen();
    }catch(e){addMsg('Error. Try typing instead.',true);if(active)setTimeout(startListen,1000)}
  };
  r.onerror=e=>{
    listening=false;$('micBtn').className='micOff';$('micBtn').textContent='🎤';
    const errors={
      'not-allowed':'Microphone access denied. Please allow mic in browser settings, or type your messages below.',
      'audio-capture':'No microphone detected. You can type your messages below.',
      'no-speech':'No speech heard. Tap 🎤 and try again, or type below.',
      'network':'Network error. Check your connection.',
      'aborted':'',
    };
    const msg=errors[e.error]||'Voice error: '+e.error+'. You can type instead.';
    if(msg)showBanner(msg);
    if(e.error!=='aborted'&&active&&!speaking)setTimeout(startListen,1500);
  };
  r.onend=()=>{listening=false;if(active&&!speaking)setTimeout(startListen,500)};
  recognition=r;
  try{r.start()}catch(e){showBanner('Could not start microphone. Use the text input below instead.')}
}

function toggleMic(){
  if(!active){greet();return}
  if(listening){if(recognition)try{recognition.abort()}catch(e){}listening=false;$('micBtn').className='micOff';$('micBtn').textContent='🎤';setState('Connected')}
  else if(!speaking)startListen();
}

let savedLead=false;
function addLead(lead){
  if(!lead||!lead.name||savedLead)return;
  savedLead=true;
  const d=document.createElement('div');d.className='lead';
  const interest=typeof lead.interest==='string'?lead.interest.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase()):(lead.interest||'');
  d.innerHTML='<b>'+lead.name+'</b><br>'+lead.phone+(interest?' &middot; '+interest:'');
  $('msgs').appendChild(d);$('msgs').scrollTop=$('msgs').scrollHeight;
  fetch('/api/leads',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    name:lead.name,phone:lead.phone,email:lead.email||'',
    interest:interest,notes:lead.requirements||'',
    score:lead.score||75,status:lead.status||'new'
  })}).catch(()=>{});
}

async function hangup(){
  try{
    if(sessionId){
      const r=await fetch('/api/ai/extract-lead',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId})});
      const d=await r.json();
      if(d.lead)addLead(d.lead);
    }
  }catch(e){}
  active=listening=speaking=false;$('micBtn').className='micOff';$('micBtn').textContent='🎤';
  if(recognition)try{recognition.abort()}catch(e){};window.speechSynthesis.cancel();
  setState('Call ended');addMsg('Call ended.',true);sessionId=null;
}

function switchLang(){lang=$('lang').value}

// Show initial message - emphasize text chat
if(!SR){
  addMsg('Welcome! Type a message below to chat with Mayalu. (Voice requires Chrome/Edge.)',true);
  $('micBtn').style.display='none';
  showBanner('Voice not supported in this browser. Text chat works fine!');
}else{
  addMsg('Welcome! Type a message or press 🎤 to speak with Mayalu.',true);
}

// Expose to global scope for onclick handlers
window.toggleMic=toggleMic;window.hangup=hangup;window.sendText=sendText;window.switchLang=switchLang;
window.SpeechRecognition=SR;
})();
</script>
</body>
</html>
